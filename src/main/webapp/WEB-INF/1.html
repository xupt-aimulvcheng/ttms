    function getRow(str) {
        var result = "";

            if (str[i]!="_"){
                result+=str[i];
            }

                break;
            }
        }
        return parseInt(result);
    }
    function getCol(str) {
        var result = "";
        var len = 0;

            if (str[i]=="_"){
                len = i;
                break;
            }
        }
        for (var i = len+1; i < str.length; i++) {
            result+=str[i];
        }
        return parseInt(result);
    }

    <li data-key='1'>111</li>
    <li data-key='2'>222</li>

        var myUl = $("#my-ul").find("li");

</script>
