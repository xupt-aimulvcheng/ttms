    var seatStr = [];
    //获取完好的座位的id
    function getString(row, col, json) {
        var seatArr = [];
        var badArray = [];
        var str = "";
        var badStr = "";
        for (var i = 1; i <= row; i++) {
            for (var j = 1; j <= col; j++) {
                for (var k = 0; k < json.length; k++) {
                    if (json[k].status == 1 && json[k].row == i && json[k].col == j) {
                        str += "a";
                    } else if (json[k].status == 2 && json[k].row == i && json[k].col == j) {
                        str += "b";
                    } else if (json[k].status == 0 && json[k].row == i && json[k].col == j) {
                        badStr += "'" + i + "_" + j + "'";
                        badArray.push(badStr);
                        badStr = "";
                        str += "a";
                    }
                }
            }
            seatArr.push(str);
            str = "";
        }
        return seatArr;
    }
    //获取损坏的座位的id
    function getBadString(row, col, json) {
        var seatArr = [];
        var badArray = [];
        var str = "";
        var badStr = "";
        for (var i = 1; i <= row; i++) {
            for (var j = 1; j <= col; j++) {
                for (var k = 0; k < json.length; k++) {
                    if (json[k].status == 1 && json[k].row == i && json[k].col == j) {
                        str += "a";
                    } else if (json[k].status == 2 && json[k].row == i && json[k].col == j) {
                        str += "b";
                    } else if (json[k].status == 0 && json[k].row == i && json[k].col == j) {
                        str += "a";
                        badStr += i + "_" + j;
                        badArray.push(badStr);
                        badStr = "";
                    }
                }
            }
            seatArr.push(str);
            if (badStr.length > 0) {
                badArray.push(badStr);
            }
            badStr = "";
            str = "";
        }
        return badArray;
    }

    $(function () {
        axios.post(
            "/seat/getSeats"
        ).then(function (response) {
            var json = response.data;
            var len = json.length;
            var rowSet = new Array(len);
            var colSet = new Array(len);
            for (var i = 0; i < len; i++) {
                rowSet.push(json[i].row);
                colSet.push(json[i].col);
            }
            var rowlen = rowSet.pop();
            var collen = colSet.pop();
            seatStr = getString(rowlen, collen, json);
            var badArr = getBadString(rowlen, collen, json);
            createSeat(seatStr, badArr, rowlen, collen);
        })
    })
    // 根据".._.."的格式获取前面的行数
    function getRow(str) {
        var result = "";
        for (var i = 0; i < str.length; i++) {
            if (str[i]!="_"){
                result+=str[i];
            }
            if (str[i] == "_") {
                break;
            }
        }
        return parseInt(result);
    }
    function getCol(str) {
        var result = "";
        var len = 0;
        for (var i = 0; i < str.length; i++) {
            if (str[i]=="_"){
                len = i;
                break;
            }
        }
        for (var i = len+1; i < str.length; i++) {
            result+=str[i];
        }
        return parseInt(result);
    }
    function getId(str) {
        var result = "";
        for (var i = 10; i < str.length; i++) {
            result+=str[i];
        }
        return result;
    }
